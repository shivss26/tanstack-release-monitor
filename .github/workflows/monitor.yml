name: release-monitor

# Detect new releases + yanks (deterministic, stdlib), then — only when there
# is pending work — enrich them into human-readable summaries via the Sonnet
# harness and commit a digest. Everything reportable found in one run lands in
# ONE combined digest email; a quiet run sends nothing.
#
# Tested via manual `workflow_dispatch`; the 4-hourly schedule is the real trigger.
on:
  workflow_dispatch: {}
  schedule:
    - cron: "17 */4 * * *"   # every 4 hours (public repo -> free unlimited minutes)

permissions:
  contents: write          # commit raw/, yanks/, state.json, prefetch/, summaries/, digest/

concurrency:
  group: release-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6.0.3

      # 1) Deterministic detection (stdlib only — no setup needed).
      - name: Detect new rollups and yanks
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 monitor/detect.py

      # 2) How much enrich work is pending? (stdlib; gates the heavy setup below.)
      - name: Count pending enrich work
        id: pending
        run: echo "count=$(python3 monitor/pending.py)" >> "$GITHUB_OUTPUT"

      # 3) Heavy setup + enrich — ONLY when something is pending.
      - name: Set up uv
        if: steps.pending.outputs.count != '0'
        uses: astral-sh/setup-uv@v8.2.0

      - name: Sync Python deps (locked)
        if: steps.pending.outputs.count != '0'
        run: uv sync --locked

      - name: Enrich pending rollups + yanks
        if: steps.pending.outputs.count != '0'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run python monitor/enrich_run.py --root . --config monitor/config.json

      # 4) Deliver — email any unsent digest (stdlib; decoupled + self-healing).
      #    Runs every time so a previously-failed send retries; a no-op when nothing is
      #    unsent or when the email secrets aren't configured.
      - name: Email unsent digests
        if: always()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DIGEST_EMAIL_TO: ${{ secrets.DIGEST_EMAIL_TO }}
        run: python3 monitor/send.py --root .

      # 5) Commit everything produced this run (detect + enrich + sent markers).
      #    always() so enrich output is persisted even if the email step failed,
      #    leaving the unsent digest to retry next run without re-enriching.
      - name: Commit changes
        if: always()
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name  "release-monitor[bot]"
            git config user.email "release-monitor@users.noreply.github.com"
            git add -A
            git commit -m "monitor: run $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          else
            echo "no changes"
          fi
